<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>UPI Offline Mesh</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/dashboard.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body class="bg-light text-dark">
<div class="container py-4">
    <div class="d-flex align-items-center justify-content-between mb-3">
        <div>
            <h1 class="h3 mb-0">UPI Offline Mesh</h1>
            <div class="text-muted small">Mesh-routed deferred settlement — monitoring console</div>
        </div>
        <div>
            <a href="/h2-console" class="btn btn-sm btn-outline-secondary">H2 Console</a>
        </div>
    </div>

    <div class="row g-3 mb-4" id="summaryCards">
        <div class="col-md-3">
            <div class="card summary-card p-3">
                <div class="d-flex align-items-center justify-content-between">
                    <div>
                        <div class="text-muted small">Accounts</div>
                        <div id="summaryAccounts" class="h4 mb-0">0</div>
                    </div>
                    <div class="summary-icon bg-primary text-white rounded-circle">👥</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card summary-card p-3">
                <div class="d-flex align-items-center justify-content-between">
                    <div>
                        <div class="text-muted small">Devices</div>
                        <div id="summaryDevices" class="h4 mb-0">0</div>
                    </div>
                    <div class="summary-icon bg-success text-white rounded-circle">📶</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card summary-card p-3">
                <div class="d-flex align-items-center justify-content-between">
                    <div>
                        <div class="text-muted small">Settled</div>
                        <div id="summarySettled" class="h4 mb-0">₹0</div>
                    </div>
                    <div class="summary-icon bg-warning text-white rounded-circle">✔️</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card summary-card p-3">
                <div class="d-flex align-items-center justify-content-between">
                    <div>
                        <div class="text-muted small">Last refresh</div>
                        <div id="summaryRefreshed" class="h6 mb-0">--</div>
                    </div>
                    <div class="summary-icon bg-secondary text-white rounded-circle">⏱</div>
                </div>
            </div>
        </div>
    </div>

    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <div class="row gy-3">
                <div class="col-lg-8">
                    <div class="row g-2 align-items-center">
                        <div class="col-auto">
                            <label class="form-label mb-1">Sender</label>
                            <select id="senderVpa" class="form-select"></select>
                        </div>
                        <div class="col-auto align-self-end fs-4">→</div>
                        <div class="col-auto">
                            <label class="form-label mb-1">Receiver</label>
                            <select id="receiverVpa" class="form-select"></select>
                        </div>
                        <div class="col-auto">
                            <label class="form-label mb-1">Amount</label>
                            <input type="number" id="amount" class="form-control" value="500" min="1">
                        </div>
                        <div class="col-auto">
                            <label class="form-label mb-1">PIN</label>
                            <input type="text" id="pin" class="form-control" value="1234" maxlength="4" placeholder="1234">
                        </div>
                        <div class="col-auto align-self-end">
                            <button id="btn-send" class="btn btn-primary" onclick="sendPacket()">Send Payment</button>
                        </div>
                    </div>
                </div>
                <div class="col-lg-4">
                    <label class="form-label mb-1">Activity Trend</label>
                    <div class="card p-2 h-100">
                        <canvas id="activityChart" height="100"></canvas>
                    </div>
                </div>
            </div>

            <div class="row g-2 mt-3">
                <div class="col-auto">
                    <button id="btn-gossip" class="btn btn-outline-primary" onclick="gossip()">Run Gossip Round</button>
                </div>
                <div class="col-auto">
                    <button id="btn-flush" class="btn btn-outline-success" onclick="flushBridges()">Bridge Upload</button>
                </div>
                <div class="col-auto">
                    <button id="btn-reset" class="btn btn-outline-danger" onclick="resetMesh()">Reset Mesh</button>
                </div>
                <div class="col-auto align-self-center text-muted small">Auto-refresh every 3s</div>
            </div>
            <div id="actionAlert" class="mt-3"></div>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-lg-6">
            <div class="card">
                <div class="card-header">📱 Mesh Devices</div>
                <div class="card-body p-2" id="devices" style="max-height:420px;overflow:auto"></div>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="card">
                <div class="card-header">🏦 Account Balances</div>
                <div class="card-body p-2">
                    <table class="table table-borderless table-hover mb-0" id="accounts-table">
                        <thead><tr><th>VPA</th><th>Holder</th><th>Balance</th></tr></thead>
                        <tbody></tbody>
                    </table>
                    <div class="small text-muted mt-2" id="cacheInfo"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="card mt-3">
        <div class="card-header d-flex flex-wrap align-items-center justify-content-between gap-2">
            <div>📜 Transaction Ledger</div>
            <div class="d-flex flex-wrap gap-2 align-items-center">
                <div class="input-group input-group-sm">
                    <label class="input-group-text" for="filterStatus">Status</label>
                    <select id="filterStatus" class="form-select" onchange="filterTransactions()">
                        <option value="ALL">All</option>
                        <option value="SETTLED">Settled</option>
                        <option value="DUPLICATE_DROPPED">Duplicate</option>
                        <option value="INVALID">Invalid</option>
                        <option value="REJECTED">Rejected</option>
                    </select>
                </div>
                <div class="input-group input-group-sm">
                    <span class="input-group-text">Search</span>
                    <input id="searchTransactions" type="text" class="form-control" placeholder="sender, receiver, bridge" oninput="filterTransactions()">
                </div>
            </div>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0" id="tx-table">
                    <thead class="table-light"><tr>
                        <th>ID</th><th>From</th><th>To</th><th>Amount</th>
                        <th>Status</th><th>Bridge</th><th>Hops</th><th>Settled</th>
                    </tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="card mt-3">
        <div class="card-header">🪵 Activity Log</div>
        <div class="card-body"><pre id="log" class="mb-0 small"></pre></div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/dashboard.js"></script>
</body>
</html>
